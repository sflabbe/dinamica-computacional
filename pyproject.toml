[project]
name = "plastic-hinge-nm"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = ["numpy", "matplotlib"]

[project.optional-dependencies]
dev = ["pytest"]
test = ["pytest"]

[project.scripts]
dc-solver-tests = "pytest:main"
dinamica-computacional = "dc_solver.cli_app:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["dc_solver*", "problems*", "plastic_hinge*"]
