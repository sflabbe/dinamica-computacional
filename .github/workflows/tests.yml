name: tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_slow:
        description: Run tests marked slow
        required: false
        type: boolean
        default: false

env:
  DC_USE_NUMBA: "0"

jobs:
  fast:
    name: pytest fast
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run fast pytest
        run: |
          python -m pytest -q -m "not slow"

  slow:
    name: pytest slow
    if: github.event_name == 'workflow_dispatch' && inputs.run_slow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run slow pytest
        run: |
          python -m pytest -q -m slow
