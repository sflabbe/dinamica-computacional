name: tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_slow:
        description: Run tests marked slow
        required: false
        type: boolean
        default: false

env:
  DC_USE_NUMBA: "0"

jobs:
  fast:
    name: pytest fast
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dependencies
        run: uv sync --all-extras --dev --frozen
      - name: Run fast pytest
        run: uv run pytest -q -m "not slow"

  slow:
    name: pytest slow
    if: github.event_name == 'workflow_dispatch' && inputs.run_slow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dependencies
        run: uv sync --all-extras --dev --frozen
      - name: Run slow pytest
        run: uv run pytest -q -m slow
